<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#090b12" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&family=Roboto+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <meta
    name="description"
    content="Health scores dashboard with compact views for overall score, key domains, and detailed health areas."
  />
  <title>Health Scores</title>
  <style>
    :root {
      --bg: #090b12;
      --panel: rgba(10, 13, 22, 0.82);
      --panel-2: rgba(14, 18, 31, 0.78);
      --border: rgba(118, 129, 255, 0.18);
      --text: #f6f4ff;
      --muted: #c9c5e0;
      --good: #d9ddff;
      --good-2: #a3acff;
      --mid: #7f88ff;
      --warn: #5d66cf;
      --bad: #414796;
      --positive: #6bcf8a;
      --positive-soft: rgba(107, 207, 138, 0.9);
      --negative: #e07a7a;
      --negative-soft: rgba(224, 122, 122, 0.92);
      --score-strong: #5bc4b8;
      --score-ok: #7b9cff;
      --score-mixed: #e4b363;
      --accent: #d8dcff;
      --accent-2: #eef0ff;
      --accent-3: #17196b;
      --moon: #5c67ff;
      --moon-soft: #2d338c;
      --shadow: 0 12px 34px rgba(0, 0, 0, 0.16);
      --radius: 24px;
      --font: "PT Sans", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --mono: "Roboto Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    * {
      box-sizing: border-box;
    }

    html {
      color-scheme: dark;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      background:
        radial-gradient(circle at top left, rgba(180, 170, 120, 0.12), transparent 28%),
        radial-gradient(circle at top right, rgba(92, 103, 255, 0.18), transparent 26%),
        radial-gradient(circle at 50% 100%, rgba(200, 210, 255, 0.08), transparent 40%),
        radial-gradient(circle at 80% 20%, rgba(107, 207, 138, 0.04), transparent 22%),
        linear-gradient(180deg, #07080d 0%, #0c0f18 100%);
    }

    .wrap {
      width: min(1320px, calc(100vw - 32px));
      margin: 24px auto 48px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-end;
      margin-bottom: 24px;
    }

    .eyebrow {
      color: var(--accent-2);
      text-transform: uppercase;
      letter-spacing: 0.2em;
      font-size: 12px;
      margin-bottom: 8px;
      font-family: var(--mono);
      text-shadow: 0 0 18px rgba(97, 105, 255, 0.18);
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 46px);
      line-height: 1.04;
      letter-spacing: -0.04em;
      font-family: var(--mono);
      font-weight: 300;
      text-transform: uppercase;
      text-shadow: 0 0 24px rgba(97, 105, 255, 0.08);
    }

    .sub {
      max-width: 720px;
      margin-top: 10px;
      color: var(--muted);
      line-height: 1.5;
      font-size: 15px;
    }

    .meta {
      color: var(--muted);
      text-align: right;
      font-size: 13px;
      line-height: 1.6;
    }

    .section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      margin-bottom: 24px;
      overflow: hidden;
    }

    .section-header {
      padding: 24px 24px 4px;
    }

    .section-title {
      margin: 0;
      font-size: 20px;
      letter-spacing: -0.02em;
    }

    .section-note {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      max-width: 52ch;
    }

    .badge-box {
      display: grid;
      place-items: center;
      min-height: 0;
      padding: 12px;
      border-radius: 20px;
      background:
        radial-gradient(circle at 50% 34%, rgba(92, 103, 255, 0.12), transparent 30%),
        radial-gradient(circle at 50% 55%, rgba(180, 185, 255, 0.06), transparent 44%),
        radial-gradient(circle at 50% 50%, rgba(17, 22, 70, 0.18), transparent 44%),
        linear-gradient(180deg, rgba(243, 242, 255, 0.025), rgba(243, 242, 255, 0.008));
      border: 1px solid rgba(118, 129, 255, 0.12);
      box-shadow:
        inset 0 1px 0 rgba(243, 242, 255, 0.04),
        inset 0 0 24px rgba(92, 103, 255, 0.06),
        inset 0 0 48px rgba(23, 25, 107, 0.08);
      position: relative;
      overflow: hidden;
    }

    .badge-box::before,
    .badge-box::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }

    .badge-box::before {
      width: 260px;
      height: 260px;
      border: 1px solid rgba(118, 129, 255, 0.07);
      box-shadow: 0 0 0 18px rgba(118, 129, 255, 0.018), 0 0 0 44px rgba(23, 25, 107, 0.03);
    }

    .badge-box::after {
      inset: 20px;
      border: 1px solid rgba(118, 129, 255, 0.06);
      border-radius: 24px;
    }

    .ring-label {
      font-size: 11px;
      fill: #d5d4ff;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-family: var(--mono);
    }

    .center-score {
      font-size: 58px;
      font-weight: 700;
      fill: #fbfbff;
      letter-spacing: -0.04em;
      font-family: var(--mono);
    }

    .center-caption {
      font-size: 11px;
      fill: #d5d4ff;
      font-family: var(--mono);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .mini-card,
    .score-card,
    .pill-card {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
    }

    .mini-card .label,
    .score-card .label,
    .pill-card .label {
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      margin-bottom: 12px;
    }

    .badge-side .mini-card {
      min-height: 170px;
      border-radius: 20px;
    }

    .badge-side .mini-card:first-child {
      grid-column: 1 / -1;
    }

    .badge-side .mini-card .value {
      font-size: 36px;
    }

    .badge-side .mini-card .desc {
      font-size: 14px;
      line-height: 1.6;
      max-width: 42ch;
    }

    .mini-card .value,
    .score-card .value {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.04em;
      margin-bottom: 10px;
    }

    .mini-card .desc,
    .score-card .desc {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .essentials-layout {
      display: grid;
      grid-template-columns: 1fr minmax(280px, auto);
      grid-template-rows: auto auto auto;
      gap: 0 32px;
      align-items: start;
      padding: 24px 24px 28px;
    }

    .essentials-profile {
      grid-column: 1;
      grid-row: 1;
      min-width: 0;
    }

    .essentials-profile .meta-kicker {
      font-size: 12px;
    }

    .essentials-profile .meta-line {
      font-size: 12px;
      line-height: 1.65;
    }

    .badge-box--essentials {
      grid-column: 2;
      grid-row: 1 / 3;
      padding: 8px;
    }

    .essentials-summary-block {
      grid-column: 1;
      grid-row: 2;
      margin-top: 20px;
      padding: 18px 20px;
      border-radius: 14px;
      background: rgba(118, 129, 255, 0.04);
      border: 1px solid rgba(118, 129, 255, 0.08);
      min-width: 0;
    }

    .essentials-summary {
      margin: 0 0 10px;
      padding: 0;
      font-size: 15px;
      line-height: 1.6;
      color: rgba(240, 241, 255, 0.9);
      max-width: 52ch;
    }

    .essentials-summary:last-child {
      margin-bottom: 0;
    }

    .essentials-summary--age {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .essentials-card {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid rgba(118, 129, 255, 0.1);
      align-self: stretch;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .essentials-layout .essentials-card:first-of-type {
      grid-column: 1;
      grid-row: 3;
    }

    .essentials-layout .essentials-card:last-of-type {
      grid-column: 2;
      grid-row: 3;
    }

    .hero-score {
      padding: 22px 22px 20px;
    }

    .hero-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .score-chip {
      min-width: 0;
      text-align: center;
      border-radius: 999px;
      padding: 5px 10px;
      background: rgba(92, 103, 255, 0.1);
      border: 1px solid rgba(118, 129, 255, 0.16);
      font-weight: 500;
      font-size: 9px;
      letter-spacing: 0.08em;
      color: #ecebff;
    }

    .hero-number {
      font-size: 76px;
      line-height: 0.94;
      font-weight: 700;
      letter-spacing: -0.06em;
      margin: 10px 0 12px;
    }

    .hero-label {
      font-size: 17px;
      line-height: 1.35;
      font-weight: 600;
      margin-bottom: 12px;
      max-width: 28ch;
    }

    .hero-summary {
      color: var(--muted);
      line-height: 1.75;
      font-size: 15px;
      max-width: 34ch;
    }

    .bar-list {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .bar-row {
      display: grid;
      gap: 6px;
    }

    .bar-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      font-size: 12px;
    }

    .bar-name {
      color: #ebe1c8;
      font-weight: 300;
      font-family: var(--mono);
      letter-spacing: 0.03em;
    }

    .bar-score {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .essentials-card .bar-list {
      gap: 16px;
      margin-top: 14px;
    }

    .essentials-card .bar-row {
      gap: 8px;
    }

    .essentials-card .bar-head {
      font-size: 16px;
    }

    .essentials-card .bar-name {
      font-size: 15px;
    }

    .essentials-card .bar-score {
      font-size: 15px;
    }

    .essentials-card .track {
      height: 14px;
    }

    .track {
      height: 8px;
      width: 100%;
      border-radius: 999px;
      background: rgba(243, 242, 255, 0.06);
      overflow: hidden;
    }

    .fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--good));
    }

    .list {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      line-height: 1.75;
      font-size: 13px;
    }

    .list li + li {
      margin-top: 8px;
    }

    .pill-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 14px;
      margin-top: 12px;
    }

    .pill-card {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .pill-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .pill-score {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.04em;
    }

    .pill-title {
      font-size: 13px;
      font-weight: 400;
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .pill-summary {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #e7e6ff;
      background: rgba(243, 242, 255, 0.04);
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(240px, 1fr));
      gap: 16px;
      padding: 16px 24px 24px;
    }

    .score-card {
      display: grid;
      gap: 12px;
      min-height: 210px;
    }

    .score-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .score-card .value {
      font-size: 38px;
      margin: 0;
    }

    .score-card .summary {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .score-card .chip {
      font-weight: 500;
    }

    .score-card .chip--Excellent {
      background: rgba(107, 207, 138, 0.18);
      border-color: rgba(107, 207, 138, 0.4);
      color: #7dd99e;
    }

    .score-card .chip--Strong {
      background: rgba(91, 196, 184, 0.18);
      border-color: rgba(91, 196, 184, 0.4);
      color: #6ee0d0;
    }

    .score-card .chip--Good {
      background: rgba(123, 156, 255, 0.18);
      border-color: rgba(123, 156, 255, 0.4);
      color: #9bb3ff;
    }

    .score-card .chip--Mixed {
      background: rgba(228, 179, 99, 0.18);
      border-color: rgba(228, 179, 99, 0.45);
      color: #f0c870;
    }

    .score-card .chip--Watch {
      background: rgba(224, 122, 122, 0.18);
      border-color: rgba(224, 122, 122, 0.4);
      color: #f09090;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 10px;
      letter-spacing: 0.08em;
      color: #e7e6ff;
      background: rgba(243, 242, 255, 0.04);
      border: 1px solid rgba(191, 196, 255, 0.12);
    }

    .footer-note {
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
      padding: 0 24px 24px;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
    }

    body::before {
      background:
        linear-gradient(rgba(191, 196, 255, 0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(191, 196, 255, 0.018) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, black 40%, transparent 90%);
      opacity: 0.18;
    }

    body::after {
      background:
        radial-gradient(circle at 15% 20%, rgba(117, 112, 18, 0.08), transparent 24%),
        radial-gradient(circle at 82% 12%, rgba(92, 103, 255, 0.12), transparent 20%),
        radial-gradient(circle at 55% 80%, rgba(214, 218, 255, 0.05), transparent 18%);
    }

    .wrap {
      margin-top: 28px;
      margin-bottom: 56px;
    }

    .topbar {
      display: block;
      margin-bottom: 10px;
      padding-left: 6px;
    }

    .hero-meta-card {
      width: fit-content;
      max-width: 100%;
      padding: 0;
      display: grid;
      gap: 6px;
      text-align: left;
      background: transparent;
      border: 0;
      border-radius: 0;
      box-shadow: none;
      opacity: 0.94;
    }

    .hero-meta-card::before {
      content: "";
      width: 68px;
      height: 1px;
      margin-bottom: 2px;
      background: linear-gradient(90deg, rgba(92, 103, 255, 0.82), rgba(92, 103, 255, 0));
    }

    .meta-kicker {
      color: rgba(232, 236, 255, 0.88);
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-family: var(--mono);
      text-shadow: 0 0 14px rgba(92, 103, 255, 0.12);
    }

    .meta-kicker::before {
      content: "◐";
      display: inline-block;
      margin-right: 8px;
      width: 1em;
      text-align: center;
      color: var(--moon);
      font-size: 14px;
      line-height: 1;
      transform: translateY(-1px);
      text-shadow: 0 0 12px rgba(92, 103, 255, 0.25);
    }

    .meta-line {
      color: rgba(240, 241, 255, 0.74);
      font-size: 10px;
      line-height: 1.7;
      letter-spacing: 0.12em;
      font-family: var(--mono);
      white-space: normal;
      overflow: visible;
      text-overflow: clip;
      text-transform: uppercase;
    }

    .meta-line .sep {
      margin: 0 8px;
      color: rgba(113, 121, 244, 0.74);
    }

    .detail-list {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 14px;
    }

    .detail-list li + li {
      margin-top: 8px;
    }

    .section {
      position: relative;
      background:
        linear-gradient(180deg, rgba(12, 16, 28, 0.9), rgba(9, 12, 22, 0.86)),
        var(--panel);
      border: 1px solid rgba(118, 129, 255, 0.12);
      box-shadow:
        0 16px 34px rgba(0, 0, 0, 0.2),
        inset 0 0 0 1px rgba(243, 242, 255, 0.012);
    }

    .section::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(92, 103, 255, 0.2), transparent);
      opacity: 0.65;
    }

    .section-header {
      padding: 24px 28px 0;
    }

    .section-title {
      color: var(--accent-2);
      font-size: 20px;
      font-family: var(--mono);
      font-weight: 300;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-shadow: 0 0 20px rgba(92, 103, 255, 0.15), 0 0 40px rgba(200, 210, 255, 0.06);
    }

    .section-title[data-icon]::before {
      content: attr(data-icon);
      display: inline-block;
      margin-right: 12px;
      width: 1em;
      text-align: center;
      color: var(--moon);
      font-size: 18px;
      line-height: 1;
      transform: translateY(-2px);
      text-shadow: 0 0 20px rgba(92, 103, 255, 0.35), 0 0 36px rgba(200, 210, 255, 0.12);
    }

    .section-note {
      max-width: 680px;
      margin-top: 10px;
      color: #cbc7e4;
      font-size: 13px;
      line-height: 1.7;
    }

    .mini-card,
    .score-card,
    .pill-card {
      background:
        linear-gradient(180deg, rgba(243, 242, 255, 0.018), rgba(243, 242, 255, 0.008)),
        linear-gradient(180deg, rgba(20, 25, 44, 0.82), rgba(13, 17, 30, 0.78));
      border: 1px solid rgba(118, 129, 255, 0.1);
      box-shadow:
        inset 0 1px 0 rgba(243, 242, 255, 0.02),
        inset 0 0 12px rgba(23, 25, 107, 0.06);
    }

    .mini-card,
    .score-card {
      transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
    }

    .mini-card:hover,
    .score-card:hover {
      transform: translateY(-1px);
      border-color: rgba(118, 129, 255, 0.2);
      box-shadow:
        inset 0 1px 0 rgba(243, 242, 255, 0.03),
        0 12px 28px rgba(0, 0, 0, 0.18),
        0 0 32px rgba(92, 103, 255, 0.08),
        0 0 48px rgba(200, 210, 255, 0.04);
    }

    .score-card {
      grid-template-rows: auto auto auto 1fr auto;
    }

    .score-card-meter {
      margin-top: -2px;
    }

    .score-card-meter .track {
      height: 10px;
      background: rgba(255, 255, 255, 0.06);
    }

    .score-card-meter .fill {
      min-width: 4px;
      transition: width 0.3s ease;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .detail-block {
      padding: 14px;
      border-radius: 14px;
      background: rgba(243, 242, 255, 0.018);
      border: 1px solid rgba(118, 129, 255, 0.08);
    }

    .detail-block:has(.detail-title.positive) {
      border-left: 3px solid rgba(107, 207, 138, 0.18);
    }

    .detail-block:has(.detail-title.watch) {
      border-left: 3px solid rgba(224, 122, 122, 0.18);
    }

    .detail-title {
      margin-bottom: 10px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-family: var(--mono);
    }

    .detail-title.positive {
      color: var(--positive);
      text-shadow: 0 0 12px rgba(107, 207, 138, 0.25);
    }

    .detail-title.positive[data-icon]::before {
      color: var(--positive);
      text-shadow: 0 0 12px rgba(107, 207, 138, 0.4);
    }

    .detail-title.watch {
      color: var(--negative);
      text-shadow: 0 0 12px rgba(224, 122, 122, 0.2);
    }

    .detail-title.watch[data-icon]::before {
      color: var(--negative);
      text-shadow: 0 0 12px rgba(224, 122, 122, 0.35);
    }

    .detail-list {
      margin: 0 0 0 1em;
      padding-left: 0.5em;
      font-size: 13px;
      line-height: 1.55;
      color: var(--muted);
      list-style: disc;
    }

    .detail-list li + li {
      margin-top: 6px;
    }

    .tag {
      background: rgba(92, 103, 255, 0.08);
      border-color: rgba(118, 129, 255, 0.14);
      font-family: var(--mono);
    }

    .score-chip,
    .chip,
    .mini-card .label,
    .score-card .label,
    .pill-card .label,
    .detail-title,
    .bar-score {
      font-family: var(--mono);
    }

    .score-chip,
    .chip {
      box-shadow: none;
      border-color: rgba(118, 129, 255, 0.16);
      background: rgba(92, 103, 255, 0.08);
      color: #eef0ff;
    }

    .score-chip[data-icon]::before,
    .chip[data-icon]::before,
    .label[data-icon]::before,
    .bar-name[data-icon]::before,
    .pill-title[data-icon]::before,
    .detail-title[data-icon]::before {
      content: attr(data-icon);
      display: inline-block;
      margin-right: 7px;
      width: 1.1em;
      text-align: center;
      color: var(--moon);
      font-size: 12px;
      line-height: 1;
      transform: translateY(0);
      text-shadow: 0 0 14px rgba(92, 103, 255, 0.18);
    }

    .badge-side .mini-card .label[data-icon]::before,
    .score-card .label[data-icon]::before {
      font-size: 15px;
      margin-right: 9px;
      width: 1em;
      text-shadow: 0 0 16px rgba(92, 103, 255, 0.28), 0 0 28px rgba(200, 210, 255, 0.08);
    }

    .clean--arc{
        border: none;
        box-shadow: none;
        background: none;
        align-self: flex-end;
    }

    .clean--arc::after {
        border: none;
        box-shadow: none;
        background: none;
    }

    @media (max-width: 900px) {
      .essentials-layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto auto auto;
      }

      .essentials-profile {
        grid-column: 1;
        grid-row: 1;
      }

      .badge-box--essentials {
        grid-column: 1;
        grid-row: 2;
        justify-self: start;
      }

      .essentials-summary-block {
        grid-column: 1;
        grid-row: 3;
      }

      .essentials-layout .essentials-card:first-of-type {
        grid-column: 1;
        grid-row: 4;
      }

      .essentials-layout .essentials-card:last-of-type {
        grid-column: 1;
        grid-row: 5;
      }
    }

    @media (max-width: 1100px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .cards-grid {
        grid-template-columns: 1fr;
      }

      .badge-side {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .meta {
        text-align: left;
      }

    }

    @media (max-width: 720px) {
      .wrap {
        width: min(100vw - 16px, 1320px);
        margin-top: 12px;
      }

      .section-header,
      .essentials-layout,
      .cards-grid,
      .footer-note {
        padding-left: 16px;
        padding-right: 16px;
      }

      .section-header {
        padding-top: 20px;

      .essentials-layout {
        padding-bottom: 20px;
      }

      .essentials-card {
        margin-top: 20px;
        padding-top: 20px;
      }

      .badge-side {
        grid-template-columns: 1fr;
      }

      .detail-grid {
        grid-template-columns: 1fr;
      }

      .topbar {
        margin-bottom: 8px;
        padding-left: 2px;
      }

      .hero-number {
        font-size: 64px;
      }
    }
  </style>

  <script>
    const data = JSON.parse(document.getElementById("scores-data").textContent);

    const keyAreaIds = [
      "metabolic_health",
      "cardiovascular_risk",
      "sleep_recovery",
      "cardiorespiratory_fitness",
      "mental_emotional_state"
    ];

    const areaMap = new Map(data.areas.map(area => [area.id, area]));
    const keyAreas = keyAreaIds.map(id => areaMap.get(id)).filter(Boolean);

    const grade = score => {
      if (score >= 90) return { label: "Excellent", color: "var(--positive)" };
      if (score >= 80) return { label: "Strong", color: "var(--score-strong)" };
      if (score >= 70) return { label: "Good", color: "var(--score-ok)" };
      if (score >= 60) return { label: "Mixed", color: "var(--score-mixed)" };
      return { label: "Watch", color: "var(--negative)" };
    };

    const scoreColor = score => {
      if (score >= 90) return "#6bcf8a";
      if (score >= 80) return "#5bc4b8";
      if (score >= 70) return "#7b9cff";
      if (score >= 60) return "#e4b363";
      return "#e07a7a";
    };

    const escapeHtml = value => String(value).replace(/[&<>"']/g, char => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;"
    })[char]);

    const strongest = [...data.areas].sort((a, b) => b.score - a.score).slice(0, 3);
    const weakest = [...data.areas].sort((a, b) => a.score - b.score).slice(0, 3);

    document.getElementById("essentialsProfile").innerHTML = `
      <div class="meta-kicker">Profile</div>
      <div class="meta-line">
        ${data.subject.age}y / ${escapeHtml(data.subject.sex)}
        <span class="sep">|</span>
        ${data.subject.height_cm}cm / ${data.subject.weight_kg}kg
        <span class="sep">|</span>
        bf ~${data.subject.body_fat_percent_est}%
        <span class="sep">|</span>
        waist ${data.subject.waist_cm}cm
      </div>
      <div class="meta-line">
        generated ${data.generated_on}
        <span class="sep">|</span>
        ${data.areas.length} systems
        <span class="sep">|</span>
        ${escapeHtml(data.overall.confidence)} confidence
      </div>
    `;

    function polar(cx, cy, r, angle) {
      const a = (angle - 90) * Math.PI / 180;
      return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
    }

    function arcPath(cx, cy, r, start, end) {
      const p1 = polar(cx, cy, r, start);
      const p2 = polar(cx, cy, r, end);
      const large = end - start > 180 ? 1 : 0;
      return `M ${p1.x} ${p1.y} A ${r} ${r} 0 ${large} 1 ${p2.x} ${p2.y}`;
    }

    const areaSymbol = areaId => ({
      metabolic_health: "☿",
      cardiovascular_risk: "♂",
      sleep_recovery: "☽",
      cardiorespiratory_fitness: "☉",
      mental_emotional_state: "♄",
      body_composition: "♁",
      kidney_health: "♃",
      liver_pancreas: "🜍",
      blood_immune_inflammation: "🜄",
      hormonal_thyroid: "♀",
      micronutrients: "🜁",
      lifestyle_behavioral_risk: "♆"
    }[areaId] || "☿");

    function getRadialSvgContent(filterId) {
      const cx = 165;
      const cy = 165;
      const sweep = 58;
      const gap = 14;
      const startBase = -150;
      const rings = keyAreas.map((area, i) => ({
        area,
        start: startBase + i * (sweep + gap),
        end: startBase + i * (sweep + gap) + sweep,
        radius: 126 - i * 16
      }));

      const bgArcs = rings.map(({ start, end, radius }) =>
        `<path d="${arcPath(cx, cy, radius, start, end)}" stroke="rgba(236,228,210,0.08)" stroke-width="11" fill="none" stroke-linecap="round" />`
      ).join("");

      const fgArcs = rings.map(({ area, start, end, radius }) => {
        const span = end - start;
        const scoreEnd = start + span * (area.score / 100);
        return `<path d="${arcPath(cx, cy, radius, start, scoreEnd)}" stroke="${scoreColor(area.score)}" stroke-width="11" fill="none" stroke-linecap="round" />`;
      }).join("");

      const ringLabel = area => ({
        metabolic_health: "METAB",
        cardiovascular_risk: "CARDIO",
        sleep_recovery: "SLEEP",
        cardiorespiratory_fitness: "FIT",
        mental_emotional_state: "MIND"
      }[area.id] || area.label.toUpperCase());

      const labelOffset = 24;
      const labels = rings.map(({ area, start, end, radius }) => {
        const mid = (start + end) / 2;
        const p = polar(cx, cy, radius + labelOffset, mid);
        return `<text x="${p.x}" y="${p.y}" text-anchor="middle" dominant-baseline="middle" class="ring-label">${ringLabel(area)}</text>`;
      }).join("");

      return `
        <defs>
          <filter id="${filterId}">
            <feGaussianBlur stdDeviation="6" result="blur"></feGaussianBlur>
            <feMerge>
              <feMergeNode in="blur"></feMergeNode>
              <feMergeNode in="SourceGraphic"></feMergeNode>
            </feMerge>
          </filter>
        </defs>
        <circle cx="${cx}" cy="${cy}" r="62" fill="rgba(243,242,255,0.045)" stroke="rgba(118,129,255,0.18)" />
        ${bgArcs}
        <g filter="url(#${filterId})">${fgArcs}</g>
        ${labels}
        <text x="${cx}" y="${cy - 6}" text-anchor="middle" dominant-baseline="middle" class="center-score">${data.overall.score}</text>
        <text x="${cx}" y="${cy + 30}" text-anchor="middle" dominant-baseline="middle" class="center-caption">OVERALL</text>
      `;
    }

    function renderRadial() {
      document.getElementById("essentialsRadialSvg").innerHTML = getRadialSvgContent("softGlowEssentials");
    }

    function renderEssentials() {
      document.getElementById("essentialsSummary").textContent = data.overall.label;
      document.getElementById("essentialsAgeSummary").textContent = data.age_context.summary;

      document.getElementById("essentialsBars").innerHTML = `
        <div class="label" data-icon="☿">Score Map</div>
        <div class="bar-list">
          ${[...data.areas]
            .sort((a, b) => b.score - a.score)
            .slice(0, 8)
            .map(area => `
              <div class="bar-row">
                <div class="bar-head">
                  <div class="bar-name" data-icon="${areaSymbol(area.id)}">${area.label}</div>
                  <div class="bar-score">${area.score}</div>
                </div>
                <div class="track"><div class="fill" style="width:${area.score}% ; background: linear-gradient(90deg, ${scoreColor(Math.max(area.score - 15, 0))}, ${scoreColor(area.score)});"></div></div>
              </div>
            `).join("")}
        </div>
      `;

      document.getElementById("essentialsLists").innerHTML = `
        <div class="pill-grid">
          <div class="pill-card">
            <div class="pill-top">
              <div class="pill-title" data-icon="♃">Top strengths</div>
              <div class="pill-score" style="color:var(--positive)">+${strongest.length}</div>
            </div>
            <ul class="list">${strongest.map(x => `<li><strong>${escapeHtml(x.label)}</strong> / ${x.score}</li>`).join("")}</ul>
          </div>
          <div class="pill-card">
            <div class="pill-top">
              <div class="pill-title" data-icon="♄">Main watch-items</div>
              <div class="pill-score" style="color:var(--negative)">-${weakest.length}</div>
            </div>
            <ul class="list">${weakest.map(x => `<li><strong>${escapeHtml(x.label)}</strong> / ${x.score}</li>`).join("")}</ul>
          </div>
          <div class="pill-card">
            <div class="pill-top">
              <div class="pill-title" data-icon="♂">Top priorities</div>
              <div class="pill-score" style="color:var(--accent)">${data.priority_actions.length}</div>
            </div>
            <ul class="list">${data.priority_actions.slice(0, 3).map(x => `<li>${escapeHtml(x.action)}</li>`).join("")}</ul>
          </div>
        </div>
      `;
    }

    function renderCards() {
      document.getElementById("cardsGrid").innerHTML = data.areas.map(area => {
        const g = grade(area.score);
        const positiveItems = (area.positives || []).slice(0, 3).map(item => `<li>${escapeHtml(item)}</li>`).join("");
        const watchItems = (area.watch_items || []).slice(0, 3).map(item => `<li>${escapeHtml(item)}</li>`).join("")
          || "<li>No active watch-items recorded.</li>";
        return `
          <article class="score-card">
            <div class="score-head">
              <div>
                <div class="label" data-icon="${areaSymbol(area.id)}">${escapeHtml(area.label)}</div>
                <div class="value" style="color:${g.color}">${area.score}</div>
              </div>
              <div class="chip chip--${g.label}">${g.label} / ${escapeHtml(area.confidence.replaceAll("_", " "))}</div>
            </div>
            <div class="summary">${escapeHtml(area.summary)}</div>
            <div class="score-card-meter">
              <div class="track">
                <div class="fill" style="width:${area.score}%; background: linear-gradient(90deg, ${scoreColor(Math.max(area.score - 20, 0))}, ${scoreColor(area.score)});"></div>
              </div>
            </div>
            <div class="detail-grid">
              <div class="detail-block">
                <div class="detail-title positive" data-icon="♃">Positive signals</div>
                <ul class="detail-list">${positiveItems}</ul>
              </div>
              <div class="detail-block">
                <div class="detail-title watch" data-icon="♄">Watch-items</div>
                <ul class="detail-list">${watchItems}</ul>
              </div>
            </div>
            <div class="tag-row">
              <span class="tag">${escapeHtml(area.id.replaceAll("_", " "))}</span>
            </div>
          </article>
        `;
      }).join("");

      document.getElementById("footerNote").textContent = data.methodology.important_note;
    }

    renderRadial();
    renderEssentials();
    renderCards();
  </script>
</body>
</html>
